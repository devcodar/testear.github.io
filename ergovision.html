<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
  />
  <title>Quest 3 AR Analyzer V1</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <!-- TensorFlow.js + COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.19.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    :root {
      --bg: rgba(10, 15, 25, 0.88);
      --line: rgba(255,255,255,0.16);
      --text: #ffffff;
      --muted: #cbd5e1;
      --ok: #16a34a;
      --warn: #d97706;
      --off: #64748b;
      --danger: #b91c1c;
      --cyan: #00e5ff;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
    }

    #hud {
      position: fixed;
      z-index: 99999;
      top: 12px;
      left: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: calc(100vw - 24px);
      pointer-events: auto;
    }

    .btn {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 99999;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      width: min(380px, calc(100vw - 24px));
      box-sizing: border-box;
      font-size: 13px;
      line-height: 1.45;
      backdrop-filter: blur(8px);
    }

    #status strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    #modal {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.82);
      padding: 20px;
      box-sizing: border-box;
    }

    #modal.open {
      display: flex;
    }

    #modalCard {
      width: min(1040px, 96vw);
      height: min(760px, 92vh);
      background: #0b1220;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #modalTop {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    #modalTop h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    #closeModal {
      background: #3f0d0d;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
    }

    #playerShell {
      position: relative;
      flex: 1;
      min-height: 320px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #000;
    }

    #videoFeed, #overlayCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #videoFeed {
      background: #000;
      transform: scaleX(-1);
    }

    #overlayCanvas {
      pointer-events: none;
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    #hiddenVideo {
      display: none;
    }

    #metrics {
      position: absolute;
      right: 12px;
      bottom: 12px;
      background: rgba(0,0,0,0.58);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- HUD 2D -->
  <div id="hud">
    <button class="btn" id="btnOpenModal">Abrir player</button>
    <button class="btn" id="btnCloseModal">Fechar player</button>
    <button class="btn" id="btnStartCamera">Iniciar câmera</button>
    <button class="btn" id="btnLoadAI">Carregar IA</button>
    <button class="btn" id="btnStartAI">Iniciar análise</button>
    <button class="btn" id="btnStopAI">Parar análise</button>
    <button class="btn" id="btnConnectWS">Conectar WS</button>
    <button class="btn" id="btnRecenter">Reposicionar painel</button>
    <button class="btn" id="btnExport">Exportar timeline</button>
  </div>

  <div id="status">
    <strong>Status</strong>
    <div id="statusText">Aguardando inicialização.</div>
  </div>

  <!-- Modal / player analisado -->
  <div id="modal">
    <div id="modalCard">
      <div id="modalTop">
        <h2>Player de análise em tempo real</h2>
        <button id="closeModal">Fechar</button>
      </div>

      <div id="playerShell">
        <video id="videoFeed" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <div id="metrics">
          FPS IA: <span id="fpsValue">0</span><br />
          Detecções: <span id="detCount">0</span><br />
          Stream WS: <span id="wsState">off</span>
        </div>
      </div>

      <div id="legend">
        <span>Modo XR confortável: câmera da usuária não é movida</span>
        <span>Painel ancorado no espaço com reposicionamento manual</span>
        <span>Modal 2D para inspeção do vídeo/análise sem sobrecarregar a cena XR</span>
      </div>
    </div>
  </div>

  <!-- Vídeo oculto usado como fonte -->
  <video id="hiddenVideo" autoplay playsinline muted></video>

  <!-- Cena A-Frame / WebXR -->
  <a-scene
    id="scene"
    renderer="antialias: true; colorManagement: true"
    xr-mode-ui="enabled: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: hit-test, hand-tracking"
    background="color: transparent"
  >
    <!-- Ambiente simples para fallback não-AR -->
    <a-plane
      position="0 0 -4"
      rotation="-90 0 0"
      width="12"
      height="12"
      color="#d8e1ea"
    ></a-plane>

    <!-- Rig -->
    <a-entity id="rig" position="0 0 0">
      <a-camera id="camera" position="0 1.6 0" look-controls wasd-controls="enabled: false"></a-camera>
    </a-entity>

    <!-- Painel espacial -->
    <a-entity id="panelRoot" position="0 1.5 -1.5">
      <a-plane
        id="panelBg"
        width="1.2"
        height="0.72"
        color="#0b1220"
        material="shader: flat; opacity: 0.92"
        radius="0.03"
      ></a-plane>

      <a-text
        id="panelTitle"
        value="AR Spatial Analyzer"
        color="#ffffff"
        align="center"
        position="0 0.25 0.01"
        width="1.6"
      ></a-text>

      <a-text
        id="panelLine1"
        value="Camera: off"
        color="#cbd5e1"
        align="left"
        position="-0.48 0.07 0.01"
        width="1.2"
      ></a-text>

      <a-text
        id="panelLine2"
        value="IA: off"
        color="#cbd5e1"
        align="left"
        position="-0.48 -0.06 0.01"
        width="1.2"
      ></a-text>

      <a-text
        id="panelLine3"
        value="Top detect: -"
        color="#cbd5e1"
        align="left"
        position="-0.48 -0.19 0.01"
        width="1.2"
      ></a-text>

      <a-box
        id="panelIndicator"
        position="0.45 0.23 0.01"
        depth="0.03"
        height="0.08"
        width="0.12"
        color="#64748b"
      ></a-box>
    </a-entity>

    <!-- Ghost futuro / timeline -->
    <a-sphere
      id="ghost"
      radius="0.08"
      color="#00e5ff"
      opacity="0.0"
      position="0 1 -3"
    ></a-sphere>
  </a-scene>

  <script>
    /******************************************************************
     * CONFIG
     ******************************************************************/
    const WS_URL = "ws://SEU_IP_LOCAL:8080";
    const FRAME_SEND_INTERVAL_MS = 500;
    const DETECT_INTERVAL_MS = 180;
    const MAX_TIMELINE = 5000;

    /******************************************************************
     * STATE
     ******************************************************************/
    const state = {
      model: null,
      stream: null,
      ws: null,
      wsConnected: false,
      analyzing: false,
      cameraReady: false,
      usingCameraFeed: false,
      lastPredictions: [],
      timeline: [],
      lastDetectTime: 0,
      lastFrameSendTime: 0,
      frameCounter: 0,
      fps: 0,
      fpsStamp: performance.now(),
      rafId: null
    };

    /******************************************************************
     * DOM
     ******************************************************************/
    const statusText = document.getElementById("statusText");
    const hiddenVideo = document.getElementById("hiddenVideo");
    const videoFeed = document.getElementById("videoFeed");
    const overlayCanvas = document.getElementById("overlayCanvas");
    const ctx = overlayCanvas.getContext("2d", { alpha: true });

    const fpsValue = document.getElementById("fpsValue");
    const detCount = document.getElementById("detCount");
    const wsState = document.getElementById("wsState");

    const modal = document.getElementById("modal");
    const closeModalBtn = document.getElementById("closeModal");

    const panelLine1 = document.getElementById("panelLine1");
    const panelLine2 = document.getElementById("panelLine2");
    const panelLine3 = document.getElementById("panelLine3");
    const panelIndicator = document.getElementById("panelIndicator");
    const panelRoot = document.getElementById("panelRoot");
    const cameraEl = document.getElementById("camera");
    const ghostEl = document.getElementById("ghost");

    /******************************************************************
     * HELPERS
     ******************************************************************/
    function setStatus(msg) {
      statusText.textContent = msg;
      console.log("[STATUS]", msg);
    }

    function setPanelStatus() {
      panelLine1.setAttribute("value", `Camera: ${state.cameraReady ? "on" : "off"}`);
      panelLine2.setAttribute("value", `IA: ${state.analyzing ? "on" : "off"}`);

      const top = state.lastPredictions[0];
      panelLine3.setAttribute(
        "value",
        top
          ? `Top detect: ${top.class} ${Math.round(top.score * 100)}%`
          : "Top detect: -"
      );

      panelIndicator.setAttribute(
        "color",
        state.analyzing ? "#16a34a" : state.cameraReady ? "#d97706" : "#64748b"
      );

      fpsValue.textContent = String(state.fps);
      detCount.textContent = String(state.lastPredictions.length);
      wsState.textContent = state.wsConnected ? "on" : "off";
    }

    function resizeCanvasToVideo() {
      const rect = videoFeed.getBoundingClientRect();
      overlayCanvas.width = Math.max(1, Math.floor(rect.width));
      overlayCanvas.height = Math.max(1, Math.floor(rect.height));
    }

    function openModal() {
      modal.classList.add("open");
      resizeCanvasToVideo();
    }

    function closeModal() {
      modal.classList.remove("open");
    }

    function updateFPS() {
      state.frameCounter += 1;
      const now = performance.now();
      if (now - state.fpsStamp >= 1000) {
        state.fps = state.frameCounter;
        state.frameCounter = 0;
        state.fpsStamp = now;
      }
    }

    function getHeadPose() {
      const p = cameraEl.object3D.position;
      const q = cameraEl.object3D.quaternion;
      return {
        position: [Number(p.x.toFixed(4)), Number(p.y.toFixed(4)), Number(p.z.toFixed(4))],
        quaternion: [Number(q.x.toFixed(4)), Number(q.y.toFixed(4)), Number(q.z.toFixed(4)), Number(q.w.toFixed(4))]
      };
    }

    function pushTimeline() {
      const entry = {
        t: Date.now(),
        head: getHeadPose(),
        detections: state.lastPredictions.slice(0, 5).map(p => ({
          label: p.class,
          score: Number(p.score.toFixed(4)),
          bbox: p.bbox.map(v => Number(v.toFixed(2)))
        }))
      };

      state.timeline.push(entry);
      if (state.timeline.length > MAX_TIMELINE) {
        state.timeline.shift();
      }
    }

    function recenterPanel() {
      const camObj = cameraEl.object3D;
      const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camObj.quaternion).normalize();
      const pos = camObj.position.clone().add(forward.multiplyScalar(1.35));
      pos.y = Math.max(1.25, camObj.position.y - 0.05);

      panelRoot.object3D.position.copy(pos);

      // faz o painel olhar para a câmera, mas só no eixo Y para ficar confortável
      const lookTarget = camObj.position.clone();
      lookTarget.y = pos.y;
      panelRoot.object3D.lookAt(lookTarget);
    }

    function exportTimeline() {
      const blob = new Blob([JSON.stringify(state.timeline, null, 2)], {
        type: "application/json"
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `quest3-ar-timeline-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus("Timeline exportada.");
    }

    function drawPredictions(predictions) {
      ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

      if (!hiddenVideo.videoWidth || !hiddenVideo.videoHeight) return;

      const scaleX = overlayCanvas.width / hiddenVideo.videoWidth;
      const scaleY = overlayCanvas.height / hiddenVideo.videoHeight;

      predictions.forEach(pred => {
        const [x, y, w, h] = pred.bbox;

        // espelha para combinar com o vídeo do player
        const drawX = overlayCanvas.width - ((x + w) * scaleX);
        const drawY = y * scaleY;
        const drawW = w * scaleX;
        const drawH = h * scaleY;

        ctx.strokeStyle = "#00E5FF";
        ctx.lineWidth = 3;
        ctx.strokeRect(drawX, drawY, drawW, drawH);

        const label = `${pred.class} ${(pred.score * 100).toFixed(1)}%`;
        ctx.font = "16px Arial";
        const textW = ctx.measureText(label).width;
        const textH = 22;

        ctx.fillStyle = "#00E5FF";
        ctx.fillRect(drawX, Math.max(0, drawY - textH), textW + 12, textH);

        ctx.fillStyle = "#051018";
        ctx.fillText(label, drawX + 6, Math.max(16, drawY - 6));
      });
    }

    function safeWSsend(obj) {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) return;
      try {
        state.ws.send(JSON.stringify(obj));
      } catch (err) {
        console.error(err);
      }
    }

    function sendFrameIfNeeded(now) {
      if (!state.wsConnected) return;
      if (now - state.lastFrameSendTime < FRAME_SEND_INTERVAL_MS) return;
      if (!state.cameraReady) return;
      if (!hiddenVideo.videoWidth || !hiddenVideo.videoHeight) return;

      state.lastFrameSendTime = now;

      // gera JPEG pequeno para monitor externo
      const temp = document.createElement("canvas");
      const tw = 480;
      const th = Math.round((hiddenVideo.videoHeight / hiddenVideo.videoWidth) * tw);
      temp.width = tw;
      temp.height = th;
      const tctx = temp.getContext("2d");
      tctx.drawImage(hiddenVideo, 0, 0, tw, th);
      const jpeg = temp.toDataURL("image/jpeg", 0.6);

      safeWSsend({
        type: "frame",
        ts: Date.now(),
        image: jpeg,
        predictions: state.lastPredictions.slice(0, 8).map(p => ({
          class: p.class,
          score: Number(p.score.toFixed(4)),
          bbox: p.bbox.map(v => Number(v.toFixed(2)))
        })),
        head: getHeadPose()
      });
    }

    /******************************************************************
     * CAMERA
     ******************************************************************/
    async function startCamera() {
      try {
        if (state.stream) {
          setStatus("Câmera já iniciada.");
          return;
        }

        setStatus("Solicitando câmera...");

        // Tentativa ampla: ambiente e alta compatibilidade
        const constraints = {
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        };

        state.stream = await navigator.mediaDevices.getUserMedia(constraints);
        hiddenVideo.srcObject = state.stream;
        videoFeed.srcObject = state.stream;

        await hiddenVideo.play();
        await videoFeed.play();

        state.cameraReady = true;
        state.usingCameraFeed = true;

        resizeCanvasToVideo();
        setStatus("Câmera iniciada.");
        setPanelStatus();
      } catch (err) {
        console.error(err);
        state.cameraReady = false;
        state.usingCameraFeed = false;
        setStatus("Falha ao iniciar câmera. O passthrough AR pode continuar, mas o feed bruto pode não estar liberado nesta versão/configuração do browser.");
        setPanelStatus();
      }
    }

    /******************************************************************
     * AI
     ******************************************************************/
    async function loadAI() {
      try {
        if (state.model) {
          setStatus("Modelo já carregado.");
          return;
        }
        setStatus("Carregando TensorFlow.js / COCO-SSD...");
        await tf.ready();
        state.model = await cocoSsd.load({ base: "lite_mobilenet_v2" });
        setStatus("Modelo carregado com sucesso.");
      } catch (err) {
        console.error(err);
        setStatus("Falha ao carregar IA.");
      }
    }

    async function detectLoop() {
      if (!state.analyzing) return;

      const now = performance.now();

      try {
        if (
          state.model &&
          state.cameraReady &&
          hiddenVideo.readyState >= 2 &&
          now - state.lastDetectTime >= DETECT_INTERVAL_MS
        ) {
          state.lastDetectTime = now;

          const preds = await state.model.detect(hiddenVideo, 12);
          state.lastPredictions = preds.sort((a, b) => b.score - a.score);
          drawPredictions(state.lastPredictions);
          pushTimeline();
          sendFrameIfNeeded(now);
        } else {
          // sem feed, ainda grava head pose para timeline
          pushTimeline();
        }
      } catch (err) {
        console.error(err);
      }

      updateFPS();
      setPanelStatus();

      // ghost discreto usando posição relativa do painel para debug visual leve
      const camPos = cameraEl.object3D.position;
      ghostEl.object3D.position.set(camPos.x, Math.max(0.9, camPos.y - 0.5), camPos.z - 2.0);
      ghostEl.setAttribute("opacity", state.analyzing ? "0.18" : "0.0");

      state.rafId = requestAnimationFrame(detectLoop);
    }

    function startAI() {
      if (!state.model) {
        setStatus("Carregue a IA primeiro.");
        return;
      }
      if (state.analyzing) {
        setStatus("Análise já está ativa.");
        return;
      }

      state.analyzing = true;
      state.rafId = requestAnimationFrame(detectLoop);
      setStatus("Análise iniciada.");
      setPanelStatus();
    }

    function stopAI() {
      state.analyzing = false;
      if (state.rafId) {
        cancelAnimationFrame(state.rafId);
        state.rafId = null;
      }
      setStatus("Análise parada.");
      setPanelStatus();
    }

    /******************************************************************
     * WEBSOCKET
     ******************************************************************/
    function connectWS() {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) {
        setStatus("WebSocket já conectado.");
        return;
      }

      try {
        setStatus("Conectando WebSocket...");
        state.ws = new WebSocket(WS_URL);

        state.ws.onopen = () => {
          state.wsConnected = true;
          setStatus("WebSocket conectado.");
          setPanelStatus();

          safeWSsend({
            type: "hello",
            device: "quest3-webxr-client",
            ts: Date.now(),
            userAgent: navigator.userAgent
          });
        };

        state.ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === "ping") {
              safeWSsend({ type: "pong", ts: Date.now() });
            }
          } catch (_) {}
        };

        state.ws.onerror = (err) => {
          console.error(err);
          setStatus("Erro no WebSocket.");
        };

        state.ws.onclose = () => {
          state.wsConnected = false;
          setStatus("WebSocket desconectado.");
          setPanelStatus();
        };
      } catch (err) {
        console.error(err);
        setStatus("Falha ao conectar WebSocket.");
      }
    }

    /******************************************************************
     * XR / A-FRAME
     ******************************************************************/
    const sceneEl = document.getElementById("scene");

    sceneEl.addEventListener("loaded", () => {
      setStatus("Cena carregada. Entre em AR pelo botão do navegador/Quest.");
      setPanelStatus();
      setTimeout(recenterPanel, 600);
    });

    sceneEl.addEventListener("enter-vr", () => {
      setStatus("Sessão imersiva iniciada.");
      setTimeout(recenterPanel, 300);
    });

    sceneEl.addEventListener("exit-vr", () => {
      setStatus("Sessão imersiva encerrada.");
    });

    window.addEventListener("resize", resizeCanvasToVideo);

    /******************************************************************
     * UI EVENTS
     ******************************************************************/
    document.getElementById("btnOpenModal").addEventListener("click", openModal);
    document.getElementById("btnCloseModal").addEventListener("click", closeModal);
    closeModalBtn.addEventListener("click", closeModal);

    document.getElementById("btnStartCamera").addEventListener("click", startCamera);
    document.getElementById("btnLoadAI").addEventListener("click", loadAI);
    document.getElementById("btnStartAI").addEventListener("click", startAI);
    document.getElementById("btnStopAI").addEventListener("click", stopAI);
    document.getElementById("btnConnectWS").addEventListener("click", connectWS);
    document.getElementById("btnRecenter").addEventListener("click", recenterPanel);
    document.getElementById("btnExport").addEventListener("click", exportTimeline);

    /******************************************************************
     * BOOT
     ******************************************************************/
    (function boot() {
      setStatus("V1 pronta. Fluxo recomendado: entrar em AR, iniciar câmera, carregar IA, iniciar análise, conectar WS.");
      setPanelStatus();
    })();
  </script>
</body>
</html>
