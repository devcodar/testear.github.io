<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>XR Biomechanics Lab</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    :root{
      --bg: rgba(8,12,20,.88);
      --line: rgba(255,255,255,.14);
      --text: #fff;
      --muted: #cbd5e1;
      --ok: #16a34a;
      --warn: #d97706;
      --danger: #b91c1c;
      --off: #64748b;
      --cyan: #00E5FF;
      --pink: #FF4FD8;
      --yellow: #FFD84D;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
    }

    #hud{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:99999;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }

    .btn,.input,.badge{
      background:var(--bg);
      color:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:13px;
      box-sizing:border-box;
      backdrop-filter:blur(8px);
    }

    .btn{
      cursor:pointer;
    }

    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .input{
      min-width:220px;
      outline:none;
    }

    .badge{
      cursor:default;
    }

    #status{
      position:fixed;
      top:74px;
      right:10px;
      z-index:99999;
      width:min(420px, calc(100vw - 20px));
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      box-sizing:border-box;
      line-height:1.45;
      font-size:13px;
      backdrop-filter:blur(8px);
    }

    #status strong{
      display:block;
      margin-bottom:6px;
      font-size:14px;
    }

    #panel2d{
      position:fixed;
      left:10px;
      bottom:10px;
      z-index:99999;
      width:min(520px, calc(100vw - 20px));
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      box-sizing:border-box;
      backdrop-filter:blur(8px);
    }

    #panel2d h3{
      margin:0 0 12px 0;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-bottom:12px;
    }

    .metric{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:rgba(255,255,255,.03);
    }

    .metric .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .metric .value{
      font-size:26px;
      font-weight:700;
    }

    .metric .sub{
      font-size:12px;
      color:var(--muted);
      margin-top:4px;
    }

    #timelineWrap{
      margin-top:8px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:rgba(255,255,255,.03);
    }

    #timeline{
      width:100%;
    }

    #eventList{
      margin-top:10px;
      max-height:140px;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px;
      background:rgba(255,255,255,.02);
      font-size:12px;
    }

    .evt{
      padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,.06);
    }

    .evt:last-child{
      border-bottom:none;
    }

    #videoWrap{
      position:fixed;
      right:10px;
      bottom:10px;
      width:min(420px, 36vw);
      aspect-ratio:16/10;
      z-index:99998;
      background:#000;
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
    }

    #videoFeed, #overlayCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }

    #videoFeed{
      transform:scaleX(-1);
      background:#000;
    }

    #overlayCanvas{
      pointer-events:none;
    }

    #videoMetrics{
      position:absolute;
      left:10px;
      bottom:10px;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      line-height:1.4;
    }

    #hiddenVideo{
      display:none;
    }
  </style>
</head>
<body>

  <div id="hud">
    <button class="btn" id="btnStartCamera">Iniciar câmera</button>
    <button class="btn" id="btnStopCamera">Parar câmera</button>
    <button class="btn" id="btnLoadModelAI">Carregar IA</button>
    <button class="btn" id="btnStartSession">Iniciar sessão</button>
    <button class="btn" id="btnStopSession">Parar sessão</button>
    <button class="btn" id="btnReset">Resetar</button>
    <button class="btn" id="btnExportExcel">Exportar Excel</button>
    <button class="btn" id="btnExportJSON">Exportar JSON</button>
    <span class="badge" id="sessionBadge">Sessão: inativa</span>
    <span class="badge" id="riskBadge">Risco: -</span>
  </div>

  <div id="status">
    <strong>Status</strong>
    <div id="statusText">Aguardando inicialização.</div>
  </div>

  <div id="panel2d">
    <h3>XR Biomechanics Lab</h3>

    <div class="grid">
      <div class="metric">
        <div class="label">Ângulo cervical</div>
        <div class="value" id="neckValue">-</div>
        <div class="sub" id="neckState">Sem leitura</div>
      </div>

      <div class="metric">
        <div class="label">Elevação do ombro</div>
        <div class="value" id="shoulderValue">-</div>
        <div class="sub" id="shoulderState">Sem leitura</div>
      </div>

      <div class="metric">
        <div class="label">Flexão lateral do tronco</div>
        <div class="value" id="trunkValue">-</div>
        <div class="sub" id="trunkState">Sem leitura</div>
      </div>

      <div class="metric">
        <div class="label">Simetria corporal</div>
        <div class="value" id="symmetryValue">-</div>
        <div class="sub" id="symmetryState">Sem leitura</div>
      </div>
    </div>

    <div id="timelineWrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <strong style="font-size:13px;">Timeline da sessão</strong>
        <span style="font-size:12px;color:var(--muted);" id="timeLabel">00:00</span>
      </div>
      <input id="timeline" type="range" min="0" max="0" value="0" step="1" />
      <div id="eventList"></div>
    </div>
  </div>

  <div id="videoWrap">
    <video id="videoFeed" autoplay playsinline muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="videoMetrics">
      FPS: <span id="fpsValue">0</span><br />
      Frames: <span id="frameCountValue">0</span><br />
      Eventos: <span id="eventCountValue">0</span><br />
      Bones: <span id="boneCountValue">0</span>
    </div>
  </div>

  <video id="hiddenVideo" autoplay playsinline muted></video>

  <a-scene
    id="scene"
    xr-mode-ui="enabled: true"
    renderer="colorManagement: true"
    webxr="requiredFeatures: local-floor; optionalFeatures: hand-tracking"
    background="color: #0b1020">

    <a-assets>
      <a-asset-item id="humanModel" src="human_malefemale_basemesh_rigged.glb"></a-asset-item>
    </a-assets>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="1 3 2" intensity="0.9"></a-light>

    <a-plane rotation="-90 0 0" width="24" height="24" color="#1a2238"></a-plane>

    <a-entity id="rig">
      <a-camera id="camera" position="0 1.6 0" look-controls wasd-controls="enabled:false"></a-camera>
    </a-entity>

    <a-entity id="avatarRoot" position="0 0 -2.2" rotation="0 180 0" scale="1 1 1">
      <a-entity id="avatarEntity" gltf-model="#humanModel"></a-entity>
    </a-entity>

    <a-entity id="panelXR" position="0 1.45 -1.15">
      <a-plane width="1.5" height="0.9" color="#0b1220" material="shader:flat;opacity:0.88"></a-plane>
      <a-text id="xrTitle" value="Biomechanics Session" color="#fff" align="center" position="0 0.28 0.01" width="1.8"></a-text>
      <a-text id="xrLine1" value="Neck: -" color="#cbd5e1" align="left" position="-0.6 0.10 0.01" width="1.4"></a-text>
      <a-text id="xrLine2" value="Shoulder: -" color="#cbd5e1" align="left" position="-0.6 -0.04 0.01" width="1.4"></a-text>
      <a-text id="xrLine3" value="Trunk: -" color="#cbd5e1" align="left" position="-0.6 -0.18 0.01" width="1.4"></a-text>
      <a-text id="xrLine4" value="Risk: -" color="#cbd5e1" align="left" position="-0.6 -0.32 0.01" width="1.4"></a-text>
    </a-entity>

  </a-scene>

  <script>
    const state = {
      stream: null,
      detector: null,
      sessionActive: false,
      cameraReady: false,
      avatarReady: false,
      avatar: null,
      bones: {},
      metrics: {
        neckAngle: null,
        shoulderElevation: null,
        trunkLean: null,
        symmetryScore: null,
        riskLevel: "-"
      },
      frames: [],
      events: [],
      fps: 0,
      fpsCounter: 0,
      fpsStamp: performance.now(),
      rafId: null,
      sessionStartTs: null,
      lastEventTs: {},
      currentFrameIndex: 0
    };

    const ui = {
      statusText: document.getElementById("statusText"),
      sessionBadge: document.getElementById("sessionBadge"),
      riskBadge: document.getElementById("riskBadge"),
      neckValue: document.getElementById("neckValue"),
      neckState: document.getElementById("neckState"),
      shoulderValue: document.getElementById("shoulderValue"),
      shoulderState: document.getElementById("shoulderState"),
      trunkValue: document.getElementById("trunkValue"),
      trunkState: document.getElementById("trunkState"),
      symmetryValue: document.getElementById("symmetryValue"),
      symmetryState: document.getElementById("symmetryState"),
      timeline: document.getElementById("timeline"),
      eventList: document.getElementById("eventList"),
      timeLabel: document.getElementById("timeLabel"),
      fpsValue: document.getElementById("fpsValue"),
      frameCountValue: document.getElementById("frameCountValue"),
      eventCountValue: document.getElementById("eventCountValue"),
      boneCountValue: document.getElementById("boneCountValue"),
      xrLine1: document.getElementById("xrLine1"),
      xrLine2: document.getElementById("xrLine2"),
      xrLine3: document.getElementById("xrLine3"),
      xrLine4: document.getElementById("xrLine4"),
      videoFeed: document.getElementById("videoFeed"),
      hiddenVideo: document.getElementById("hiddenVideo"),
      overlayCanvas: document.getElementById("overlayCanvas")
    };

    const ctx = ui.overlayCanvas.getContext("2d");

    function setStatus(msg){
      ui.statusText.textContent = msg;
      console.log("[STATUS]", msg);
    }

    function setSessionBadge(){
      ui.sessionBadge.textContent = state.sessionActive ? "Sessão: ativa" : "Sessão: inativa";
      ui.riskBadge.textContent = "Risco: " + state.metrics.riskLevel;
    }

    function updateFPS(){
      state.fpsCounter++;
      const now = performance.now();
      if (now - state.fpsStamp >= 1000){
        state.fps = state.fpsCounter;
        state.fpsCounter = 0;
        state.fpsStamp = now;
      }
    }

    function resizeCanvas(){
      const rect = ui.videoFeed.getBoundingClientRect();
      ui.overlayCanvas.width = Math.max(1, Math.floor(rect.width));
      ui.overlayCanvas.height = Math.max(1, Math.floor(rect.height));
    }

    function deg(v){
      return v == null || Number.isNaN(v) ? null : v * 180 / Math.PI;
    }

    function round1(v){
      return v == null || Number.isNaN(v) ? "-" : `${v.toFixed(1)}°`;
    }

    function clamp(v,min,max){
      return Math.max(min, Math.min(max, v));
    }

    function getKPMap(keypoints){
      const map = {};
      for (const kp of keypoints){
        map[kp.name] = kp;
      }
      return map;
    }

    function isVisible(kp, min=0.25){
      return !!kp && (kp.score == null || kp.score >= min);
    }

    function angleABC(a,b,c){
      const abx = a.x - b.x;
      const aby = a.y - b.y;
      const cbx = c.x - b.x;
      const cby = c.y - b.y;

      const dot = abx * cbx + aby * cby;
      const mag1 = Math.hypot(abx, aby);
      const mag2 = Math.hypot(cbx, cby);
      if (!mag1 || !mag2) return null;

      const cos = clamp(dot / (mag1 * mag2), -1, 1);
      return deg(Math.acos(cos));
    }

    function angleLine(a,b){
      return deg(Math.atan2(b.y - a.y, b.x - a.x));
    }

    function distance(a,b){
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function addEvent(type, severity, details={}){
      const now = Date.now();
      const key = `${type}_${severity}`;
      const debounceMs = 1800;
      if (state.lastEventTs[key] && now - state.lastEventTs[key] < debounceMs) return;
      state.lastEventTs[key] = now;

      state.events.push({
        timestamp: new Date(now).toISOString(),
        t: now,
        type,
        severity,
        ...details
      });

      if (state.events.length > 300) state.events.shift();
      renderEventList();
    }

    function renderEventList(){
      ui.eventList.innerHTML = "";
      const recent = [...state.events].slice(-12).reverse();

      recent.forEach(evt => {
        const row = document.createElement("div");
        row.className = "evt";
        row.textContent = `${new Date(evt.t).toLocaleTimeString("pt-BR")} · ${evt.type} · ${evt.severity}`;
        ui.eventList.appendChild(row);
      });

      ui.eventCountValue.textContent = String(state.events.length);
    }

    function updateMetricsUI(){
      const m = state.metrics;

      ui.neckValue.textContent = round1(m.neckAngle);
      ui.shoulderValue.textContent = round1(m.shoulderElevation);
      ui.trunkValue.textContent = round1(m.trunkLean);
      ui.symmetryValue.textContent = m.symmetryScore == null ? "-" : `${m.symmetryScore.toFixed(0)}%`;

      ui.neckState.textContent =
        m.neckAngle == null ? "Sem leitura" :
        m.neckAngle > 25 ? "Alerta cervical" :
        m.neckAngle > 15 ? "Atenção" : "Estável";

      ui.shoulderState.textContent =
        m.shoulderElevation == null ? "Sem leitura" :
        m.shoulderElevation > 70 ? "Risco alto" :
        m.shoulderElevation > 45 ? "Atenção" : "Estável";

      ui.trunkState.textContent =
        m.trunkLean == null ? "Sem leitura" :
        m.trunkLean > 20 ? "Compensação" :
        m.trunkLean > 10 ? "Atenção" : "Estável";

      ui.symmetryState.textContent =
        m.symmetryScore == null ? "Sem leitura" :
        m.symmetryScore < 70 ? "Assimetria relevante" :
        m.symmetryScore < 85 ? "Leve assimetria" : "Boa simetria";

      ui.xrLine1.setAttribute("value", `Neck: ${round1(m.neckAngle)}`);
      ui.xrLine2.setAttribute("value", `Shoulder: ${round1(m.shoulderElevation)}`);
      ui.xrLine3.setAttribute("value", `Trunk: ${round1(m.trunkLean)}`);
      ui.xrLine4.setAttribute("value", `Risk: ${m.riskLevel}`);

      setSessionBadge();
      ui.fpsValue.textContent = String(state.fps);
      ui.frameCountValue.textContent = String(state.frames.length);
      ui.boneCountValue.textContent = String(Object.keys(state.bones).length);
    }

    async function startCamera(){
      try{
        if (state.stream){
          setStatus("Câmera já iniciada.");
          return;
        }

        state.stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        ui.hiddenVideo.srcObject = state.stream;
        ui.videoFeed.srcObject = state.stream;

        await ui.hiddenVideo.play();
        await ui.videoFeed.play();

        state.cameraReady = true;
        resizeCanvas();
        setStatus("Câmera iniciada.");
      }catch(err){
        console.error(err);
        setStatus("Falha ao iniciar a câmera.");
      }
    }

    function stopCamera(){
      if (!state.stream) return;
      state.stream.getTracks().forEach(t => t.stop());
      state.stream = null;
      state.cameraReady = false;
      ui.hiddenVideo.srcObject = null;
      ui.videoFeed.srcObject = null;
      setStatus("Câmera parada.");
    }

    async function loadAI(){
      try{
        if (state.detector){
          setStatus("IA já carregada.");
          return;
        }

        setStatus("Carregando TensorFlow...");
        await tf.ready();

        setStatus("Carregando detector de pose...");
        state.detector = await poseDetection.createDetector(
          poseDetection.SupportedModels.MoveNet,
          {
            modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
            enableSmoothing: true
          }
        );

        setStatus("IA carregada.");
      }catch(err){
        console.error(err);
        setStatus("Falha ao carregar IA.");
      }
    }

    function findBoneStartsWith(root, prefix){
      let found = null;
      root.traverse(obj => {
        if (found) return;
        if (obj.isBone && obj.name.startsWith(prefix)) found = obj;
      });
      return found;
    }

    function captureAvatarBones(){
      const avatarObj = document.querySelector("#avatarEntity").getObject3D("mesh");
      if (!avatarObj){
        setStatus("Mesh do avatar ainda não disponível.");
        return;
      }

      state.avatar = avatarObj;

      const prefixes = {
        head: "head_",
        neck: "neck_",
        spine: "spine_fk.002",
        upperArmL: "upper_arm_fk.L",
        forearmL: "forearm_fk.L",
        handL: "hand_fk.L",
        upperArmR: "upper_arm_fk.R",
        forearmR: "forearm_fk.R",
        handR: "hand_fk.R",
        thighL: "thigh_fk.L",
        shinL: "shin_fk.L",
        footL: "foot_fk.L",
        thighR: "thigh_fk.R",
        shinR: "shin_fk.R",
        footR: "foot_fk.R"
      };

      Object.entries(prefixes).forEach(([key, prefix]) => {
        const bone = findBoneStartsWith(avatarObj, prefix);
        if (bone) state.bones[key] = bone;
      });

      state.avatarReady = true;
      updateMetricsUI();
      setStatus("Bones do avatar mapeados.");
    }

    function drawKP(kp, color="#00E5FF", radius=4){
      if (!isVisible(kp)) return;
      const x = ui.overlayCanvas.width - (kp.x * ui.overlayCanvas.width / ui.hiddenVideo.videoWidth);
      const y = kp.y * ui.overlayCanvas.height / ui.hiddenVideo.videoHeight;
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSeg(a,b,color="#FFD84D", lineWidth=3){
      if (!isVisible(a) || !isVisible(b)) return;
      const ax = ui.overlayCanvas.width - (a.x * ui.overlayCanvas.width / ui.hiddenVideo.videoWidth);
      const ay = a.y * ui.overlayCanvas.height / ui.hiddenVideo.videoHeight;
      const bx = ui.overlayCanvas.width - (b.x * ui.overlayCanvas.width / ui.hiddenVideo.videoWidth);
      const by = b.y * ui.overlayCanvas.height / ui.hiddenVideo.videoHeight;

      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();
    }

    function drawPose(keypoints){
      const kp = getKPMap(keypoints);

      const skeleton = [
        ["left_shoulder","right_shoulder"],
        ["left_shoulder","left_elbow"],
        ["left_elbow","left_wrist"],
        ["right_shoulder","right_elbow"],
        ["right_elbow","right_wrist"],
        ["left_shoulder","left_hip"],
        ["right_shoulder","right_hip"],
        ["left_hip","right_hip"],
        ["left_hip","left_knee"],
        ["left_knee","left_ankle"],
        ["right_hip","right_knee"],
        ["right_knee","right_ankle"],
        ["nose","left_shoulder"],
        ["nose","right_shoulder"]
      ];

      skeleton.forEach(([a,b]) => drawSeg(kp[a], kp[b]));
      Object.values(kp).forEach(point => drawKP(point));
    }

    function inferRiskLevel(m){
      let risk = "Baixo";
      if ((m.neckAngle ?? 0) > 15 || (m.shoulderElevation ?? 0) > 45 || (m.trunkLean ?? 0) > 10){
        risk = "Moderado";
      }
      if ((m.neckAngle ?? 0) > 25 || (m.shoulderElevation ?? 0) > 70 || (m.trunkLean ?? 0) > 20){
        risk = "Alto";
      }
      return risk;
    }

    function computeMetrics(keypoints){
      const kp = getKPMap(keypoints);

      let neckAngle = null;
      let shoulderElevation = null;
      let trunkLean = null;
      let symmetryScore = null;

      const nose = kp.nose;
      const ls = kp.left_shoulder;
      const rs = kp.right_shoulder;
      const le = kp.left_elbow;
      const re = kp.right_elbow;
      const lw = kp.left_wrist;
      const rw = kp.right_wrist;
      const lh = kp.left_hip;
      const rh = kp.right_hip;

      if (isVisible(nose) && isVisible(ls) && isVisible(rs)){
        const shoulderMid = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
        const verticalRef = { x: shoulderMid.x, y: shoulderMid.y - 100 };
        neckAngle = angleABC(verticalRef, shoulderMid, nose);
      }

      if (isVisible(ls) && isVisible(le)){
        const leftArmToVertical = Math.abs(90 - Math.abs(angleLine(ls, le)));
        shoulderElevation = leftArmToVertical;
      }
      if (isVisible(rs) && isVisible(re)){
        const rightArmToVertical = Math.abs(90 - Math.abs(angleLine(rs, re)));
        shoulderElevation = shoulderElevation == null ? rightArmToVertical : Math.max(shoulderElevation, rightArmToVertical);
      }

      if (isVisible(ls) && isVisible(rs) && isVisible(lh) && isVisible(rh)){
        const shoulderMid = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
        const hipMid = { x: (lh.x + rh.x) / 2, y: (lh.y + rh.y) / 2 };
        const torsoAngle = Math.abs(angleLine(shoulderMid, hipMid) + 90);
        trunkLean = torsoAngle;
      }

      if (isVisible(lw) && isVisible(rw) && isVisible(ls) && isVisible(rs)){
        const leftReach = distance(ls, lw);
        const rightReach = distance(rs, rw);
        const maxD = Math.max(leftReach, rightReach, 1);
        symmetryScore = 100 - (Math.abs(leftReach - rightReach) / maxD) * 100;
      }

      state.metrics.neckAngle = neckAngle;
      state.metrics.shoulderElevation = shoulderElevation;
      state.metrics.trunkLean = trunkLean;
      state.metrics.symmetryScore = symmetryScore;
      state.metrics.riskLevel = inferRiskLevel(state.metrics);

      if ((neckAngle ?? 0) > 25) addEvent("Cervical risk", "alto", { angle: neckAngle });
      else if ((neckAngle ?? 0) > 15) addEvent("Cervical warning", "moderado", { angle: neckAngle });

      if ((shoulderElevation ?? 0) > 70) addEvent("Shoulder elevation", "alto", { angle: shoulderElevation });
      else if ((shoulderElevation ?? 0) > 45) addEvent("Shoulder warning", "moderado", { angle: shoulderElevation });

      if ((trunkLean ?? 0) > 20) addEvent("Trunk compensation", "alto", { angle: trunkLean });
      else if ((trunkLean ?? 0) > 10) addEvent("Trunk warning", "moderado", { angle: trunkLean });

      updateMetricsUI();
    }

    function animateAvatarFromPose(keypoints){
      if (!state.avatarReady) return;
      const kp = getKPMap(keypoints);

      const b = state.bones;

      if (b.neck && isVisible(kp.nose) && isVisible(kp.left_shoulder) && isVisible(kp.right_shoulder)){
        const ls = kp.left_shoulder;
        const rs = kp.right_shoulder;
        const sm = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
        const headDir = angleLine(sm, kp.nose);
        b.neck.rotation.z = THREE.MathUtils.degToRad(-(headDir + 90) * 0.25);
      }

      if (b.head && isVisible(kp.nose) && isVisible(kp.left_shoulder) && isVisible(kp.right_shoulder)){
        const ls = kp.left_shoulder;
        const rs = kp.right_shoulder;
        const sm = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
        const headDir = angleLine(sm, kp.nose);
        b.head.rotation.z = THREE.MathUtils.degToRad(-(headDir + 90) * 0.35);
      }

      if (b.upperArmL && isVisible(kp.left_shoulder) && isVisible(kp.left_elbow)){
        const a = angleLine(kp.left_shoulder, kp.left_elbow);
        b.upperArmL.rotation.z = THREE.MathUtils.degToRad(-a * 0.6);
      }

      if (b.forearmL && isVisible(kp.left_shoulder) && isVisible(kp.left_elbow) && isVisible(kp.left_wrist)){
        const elbow = angleABC(kp.left_shoulder, kp.left_elbow, kp.left_wrist);
        if (elbow != null) b.forearmL.rotation.z = THREE.MathUtils.degToRad((180 - elbow) * 0.7);
      }

      if (b.upperArmR && isVisible(kp.right_shoulder) && isVisible(kp.right_elbow)){
        const a = angleLine(kp.right_shoulder, kp.right_elbow);
        b.upperArmR.rotation.z = THREE.MathUtils.degToRad(-a * 0.6);
      }

      if (b.forearmR && isVisible(kp.right_shoulder) && isVisible(kp.right_elbow) && isVisible(kp.right_wrist)){
        const elbow = angleABC(kp.right_shoulder, kp.right_elbow, kp.right_wrist);
        if (elbow != null) b.forearmR.rotation.z = THREE.MathUtils.degToRad(-(180 - elbow) * 0.7);
      }

      if (b.thighL && isVisible(kp.left_hip) && isVisible(kp.left_knee)){
        const a = angleLine(kp.left_hip, kp.left_knee);
        b.thighL.rotation.z = THREE.MathUtils.degToRad(-a * 0.15);
      }

      if (b.shinL && isVisible(kp.left_hip) && isVisible(kp.left_knee) && isVisible(kp.left_ankle)){
        const knee = angleABC(kp.left_hip, kp.left_knee, kp.left_ankle);
        if (knee != null) b.shinL.rotation.z = THREE.MathUtils.degToRad((180 - knee) * 0.25);
      }

      if (b.thighR && isVisible(kp.right_hip) && isVisible(kp.right_knee)){
        const a = angleLine(kp.right_hip, kp.right_knee);
        b.thighR.rotation.z = THREE.MathUtils.degToRad(-a * 0.15);
      }

      if (b.shinR && isVisible(kp.right_hip) && isVisible(kp.right_knee) && isVisible(kp.right_ankle)){
        const knee = angleABC(kp.right_hip, kp.right_knee, kp.right_ankle);
        if (knee != null) b.shinR.rotation.z = THREE.MathUtils.degToRad(-(180 - knee) * 0.25);
      }
    }

    function captureFrameData(keypoints){
      const m = state.metrics;
      const t = Date.now();
      state.frames.push({
        timestamp: new Date(t).toISOString(),
        t,
        neckAngle: m.neckAngle,
        shoulderElevation: m.shoulderElevation,
        trunkLean: m.trunkLean,
        symmetryScore: m.symmetryScore,
        riskLevel: m.riskLevel,
        keypoints: keypoints.map(k => ({
          name: k.name,
          x: +k.x.toFixed(2),
          y: +k.y.toFixed(2),
          score: k.score == null ? null : +k.score.toFixed(4)
        }))
      });

      ui.timeline.max = Math.max(0, state.frames.length - 1);
      ui.timeline.value = state.frames.length - 1;
      ui.frameCountValue.textContent = String(state.frames.length);

      if (state.sessionStartTs){
        const sec = Math.floor((t - state.sessionStartTs) / 1000);
        const mm = String(Math.floor(sec / 60)).padStart(2,"0");
        const ss = String(sec % 60).padStart(2,"0");
        ui.timeLabel.textContent = `${mm}:${ss}`;
      }
    }

    function scrubFrame(index){
      const frame = state.frames[index];
      if (!frame) return;

      ui.timeLabel.textContent = new Date(frame.t).toLocaleTimeString("pt-BR");
      ui.neckValue.textContent = frame.neckAngle == null ? "-" : `${frame.neckAngle.toFixed(1)}°`;
      ui.shoulderValue.textContent = frame.shoulderElevation == null ? "-" : `${frame.shoulderElevation.toFixed(1)}°`;
      ui.trunkValue.textContent = frame.trunkLean == null ? "-" : `${frame.trunkLean.toFixed(1)}°`;
      ui.symmetryValue.textContent = frame.symmetryScore == null ? "-" : `${frame.symmetryScore.toFixed(0)}%`;
    }

    async function processLoop(){
      if (!state.sessionActive || !state.detector || !state.cameraReady){
        state.rafId = requestAnimationFrame(processLoop);
        return;
      }

      try{
        if (ui.hiddenVideo.readyState >= 2){
          resizeCanvas();
          ctx.clearRect(0,0,ui.overlayCanvas.width,ui.overlayCanvas.height);

          const poses = await state.detector.estimatePoses(ui.hiddenVideo, {
            maxPoses: 1,
            flipHorizontal: false
          });

          if (poses && poses[0] && poses[0].keypoints){
            const keypoints = poses[0].keypoints;
            drawPose(keypoints);
            computeMetrics(keypoints);
            animateAvatarFromPose(keypoints);
            captureFrameData(keypoints);
          }
        }
      }catch(err){
        console.error(err);
      }

      updateFPS();
      updateMetricsUI();
      state.rafId = requestAnimationFrame(processLoop);
    }

    function startSession(){
      if (!state.cameraReady){
        setStatus("Inicie a câmera primeiro.");
        return;
      }
      if (!state.detector){
        setStatus("Carregue a IA primeiro.");
        return;
      }

      state.sessionActive = true;
      state.sessionStartTs = Date.now();
      setStatus("Sessão iniciada.");
      addEvent("Session started", "info");
      setSessionBadge();

      if (!state.rafId){
        state.rafId = requestAnimationFrame(processLoop);
      }
    }

    function stopSession(){
      state.sessionActive = false;
      setStatus("Sessão encerrada.");
      addEvent("Session ended", "info");
      setSessionBadge();
    }

    function resetAll(){
      stopSession();
      state.frames = [];
      state.events = [];
      state.metrics = {
        neckAngle: null,
        shoulderElevation: null,
        trunkLean: null,
        symmetryScore: null,
        riskLevel: "-"
      };
      state.lastEventTs = {};
      renderEventList();
      updateMetricsUI();
      ui.timeline.max = 0;
      ui.timeline.value = 0;
      ui.timeLabel.textContent = "00:00";
      ctx.clearRect(0,0,ui.overlayCanvas.width,ui.overlayCanvas.height);
      setStatus("Sistema resetado.");
    }

    function exportJSON(){
      const payload = {
        sessionStartedAt: state.sessionStartTs ? new Date(state.sessionStartTs).toISOString() : null,
        frames: state.frames,
        events: state.events
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "xr_biomechanics_session.json";
      a.click();
    }

    function exportExcel(){
      const wb = XLSX.utils.book_new();

      const summary = [{
        session_start: state.sessionStartTs ? new Date(state.sessionStartTs).toISOString() : "",
        total_frames: state.frames.length,
        total_events: state.events.length,
        latest_risk: state.metrics.riskLevel
      }];

      const posture = state.frames.map(f => ({
        timestamp: f.timestamp,
        neck_angle: f.neckAngle,
        shoulder_elevation: f.shoulderElevation,
        trunk_lean: f.trunkLean,
        symmetry_score: f.symmetryScore,
        risk_level: f.riskLevel
      }));

      const events = state.events.map(e => ({
        timestamp: e.timestamp,
        type: e.type,
        severity: e.severity,
        angle: e.angle ?? "",
      }));

      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), "SessionSummary");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(posture), "PostureMetrics");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(events), "Events");

      XLSX.writeFile(wb, "xr_biomechanics_session.xlsx");
    }

    document.getElementById("btnStartCamera").addEventListener("click", startCamera);
    document.getElementById("btnStopCamera").addEventListener("click", stopCamera);
    document.getElementById("btnLoadModelAI").addEventListener("click", loadAI);
    document.getElementById("btnStartSession").addEventListener("click", startSession);
    document.getElementById("btnStopSession").addEventListener("click", stopSession);
    document.getElementById("btnReset").addEventListener("click", resetAll);
    document.getElementById("btnExportExcel").addEventListener("click", exportExcel);
    document.getElementById("btnExportJSON").addEventListener("click", exportJSON);

    ui.timeline.addEventListener("input", e => {
      scrubFrame(Number(e.target.value));
    });

    document.querySelector("#avatarEntity").addEventListener("model-loaded", () => {
      setStatus("Modelo 3D carregado.");
      setTimeout(captureAvatarBones, 300);
    });

    document.querySelector("#scene").addEventListener("loaded", () => {
      setStatus("Cena XR pronta.");
      resizeCanvas();
      updateMetricsUI();
      renderEventList();
    });

    window.addEventListener("resize", resizeCanvas);
  </script>
</body>
</html>
